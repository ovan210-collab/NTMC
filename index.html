<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安坑勤前指示中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth_container" class="flex flex-col items-center justify-center min-h-[80vh] space-y-8">
        <div class="bg-white p-12 rounded-[2rem] shadow-2xl text-center border-t-8 border-blue-600 max-w-sm w-full">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-4">身分驗證</h2>
            <p class="text-slate-500 mb-10 font-bold leading-relaxed">本系統僅供安坑車務中心<br>授權人員登入使用</p>
            <div id="g_id_onload"
                 data-client_id="60751568124-0jn0tiv85us5u2lf2fr0c501226jcpi6.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-size="large" data-theme="filled_blue" data-text="signin_with" data-shape="pill"></div>
        </div>
    </div>

    <div id="main_content" class="max-w-5xl mx-auto space-y-6 hidden">
        <header class="bg-white p-10 rounded-[2.5rem] shadow-xl border-t-[12px] border-blue-900 text-center">
            <h1 class="text-3xl md:text-5xl font-black text-blue-900 tracking-tight">安坑車務中心司機員勤前指示</h1>
            <div class="mt-10 flex flex-wrap justify-center gap-10 text-2xl font-bold">
                <div class="flex items-center gap-2">📅 日期：<span id="date" class="text-slate-900 border-b-4 border-blue-200 px-2">讀取中...</span></div>
                <div class="flex items-center gap-2">🗓️ 星期：<span id="week" class="text-slate-900 border-b-4 border-blue-200 px-2">-</span></div>
                <div class="flex items-center gap-2 text-red-600">🌡️ 空調設定：<span id="temp" class="px-2">-°C</span></div>
            </div>
        </header>

        <section class="bg-white p-12 rounded-[3rem] shadow-2xl border border-blue-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-3 h-full bg-blue-600"></div>
            <h3 class="text-3xl font-black text-blue-800 mb-8">今日行車運轉重點</h3>
            <div id="plan-content" class="text-3xl font-bold text-slate-800 leading-[1.6]">正在搜尋指定頁面資料...</div>
        </section>
        
        <footer class="flex justify-between items-center px-4">
            <div id="status-tag" class="text-slate-400 font-bold">連線狀態確認中...</div>
            <button onclick="location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-2xl font-black shadow-lg">🔄 重新整理</button>
        </footer>
    </div>

    <script>
        const SPREADSHEET_ID = '1Qjzc0SVrW82cqaxMnPS_YJbbFVXCUFtL652L2PM2SU4';
        const API_KEY = 'AIzaSyD7Bnmu-RZx-jU6DqbEn28Ew1SMKyRnGOQ';
        const TARGET_GID = 1753096036; // 這是您截圖中確定的頁面 ID

        async function handleCredentialResponse(response) {
            document.getElementById('auth_container').classList.add('hidden');
            document.getElementById('main_content').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            try {
                // 第一步：先抓取整份試算表的資訊，找出 GID 對應的名稱
                const metadataUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?key=${API_KEY}`;
                const metaRes = await fetch(metadataUrl);
                const metaData = await metaRes.json();
                
                if (metaData.error) throw new Error(metaData.error.message);

                // 尋找符合 GID 的分頁名稱
                const sheet = metaData.sheets.find(s => s.properties.sheetId === TARGET_GID);
                if (!sheet) throw new Error("找不到指定的試算表分頁 (GID: 1753096036)");
                
                const sheetName = sheet.properties.title;
                console.log("找到分頁名稱：", sheetName);

                // 第二步：使用找到的名稱抓取資料
                const dataUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}!A1:E20?key=${API_KEY}`;
                const dataRes = await fetch(dataUrl);
                const data = await dataRes.json();

                const rows = data.values;
                if (rows && rows.length >= 3) {
                    document.getElementById('date').innerText = rows[2][0] || '-';
                    document.getElementById('week').innerText = rows[2][1] || '-';
                    document.getElementById('temp').innerText = (rows[2][2] || '-') + '°C';
                    
                    const planText = (rows[10] && rows[10][1]) ? rows[10][1] : '今日暫無特定運轉重點。';
                    document.getElementById('plan-content').innerHTML = `
                        <div class="bg-yellow-50 p-6 rounded-2xl border-l-8 border-yellow-400 font-bold">
                            ${planText.replace(/\n/g, '<br>')}
                        </div>
                    `;
                    document.getElementById('status-tag').innerText = "✅ 已成功讀取頁面 [" + sheetName + "]";
                    document.getElementById('status-tag').className = 'text-green-600 font-bold';
                }
            } catch (error) {
                document.getElementById('plan-content').innerText = "讀取失敗：" + error.message;
                document.getElementById('status-tag').innerText = "❌ 連線失敗";
                document.getElementById('status-tag').className = 'text-red-500 font-bold';
            }
        }
    </script>
</body>
</html>
