<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安坑勤前指示中心 - 自動更新版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8fafc; }
        .loading { animate: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <header class="bg-white p-8 rounded-3xl shadow-sm border-t-8 border-blue-800 text-center">
            <h1 class="text-xl font-bold text-slate-500 tracking-widest mb-2">新北大眾捷運(股)公司</h1>
            <h2 class="text-3xl md:text-4xl font-black text-blue-900">安坑車務中心司機員勤前指示</h2>
            <div class="mt-8 flex justify-center gap-8 text-lg font-bold">
                <p>日期：<span id="date" class="text-slate-900 border-b px-2">載入中...</span></p>
                <p>星期：<span id="week" class="text-slate-900 border-b px-2">-</span></p>
                <p>空調：<span id="temp" class="text-red-600 px-2">-°C</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-emerald-500">
                <p class="text-xs text-slate-400 font-black mb-4">今日值班台人員</p>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-50 p-3 rounded-lg"><span class="text-xs text-slate-400 block">早領</span><b id="staff-m" class="text-lg">-</b></div>
                    <div class="bg-slate-50 p-3 rounded-lg"><span class="text-xs text-slate-400 block">午領</span><b id="staff-a" class="text-lg">-</b></div>
                    <div class="bg-slate-50 p-3 rounded-lg"><span class="text-xs text-slate-400 block">夜領</span><b id="staff-n" class="text-lg">-</b></div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-orange-500">
                <p class="text-xs text-slate-400 font-black mb-2">今日可用車組狀態</p>
                <p id="trains" class="text-lg font-bold text-slate-700 whitespace-pre-line">資料同步中...</p>
            </div>
        </div>

        <section class="bg-white p-8 rounded-3xl shadow-lg border border-blue-100">
            <h3 class="text-xl font-black text-blue-800 mb-6 border-b pb-2">今日行車運轉重點</h3>
            <div id="plan-content" class="text-xl font-bold text-slate-800 leading-relaxed text-justify">
                <span class="text-slate-300">正在從 Google 試算表同步最新指示...</span>
            </div>
        </section>

        <footer class="flex justify-between items-center no-print">
            <div class="text-slate-400 font-bold">發起人員：<span id="author" class="text-slate-800 border-b px-4">-</span></div>
            <button onclick="window.print()" class="bg-red-700 text-white px-8 py-2 rounded-xl font-bold shadow-lg">列印 PDF</button>
        </footer>
    </div>

    <script>
        // 【請修改這裡】填入你的 Google 試算表 ID
        const SPREADSHEET_ID = '1Qjzc0SVrW82cqaxMnPS_YJbbFVXCUFtL652L2PM2SU4';
        
        // 抓取 CSV 格式的資料 (最簡單的方法)
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=1753096036`;

        async function fetchData() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));

                // 假設你的資料位置如下 (你可以根據試算表行列自行調整 index)
                // 這裡的邏輯需要對應你的試算表格子位置
                document.getElementById('date').innerText = rows[2][0] || '未定'; // 範例：抓取第3列第1個
                document.getElementById('week').innerText = rows[2][1] || '-';
                document.getElementById('temp').innerText = rows[2][2] + '°C';
                
                document.getElementById('staff-m').innerText = rows[5][1] || '-';
                document.getElementById('staff-a').innerText = rows[5][2] || '-';
                document.getElementById('staff-n').innerText = rows[5][3] || '-';

                document.getElementById('trains').innerText = rows[8][1] || '正常運轉';

                // 處理運轉重點 (加上螢光底)
                const mainPlan = rows[10][1] || '今日無特定重點';
                document.getElementById('plan-content').innerHTML = `
                    <span class="bg-yellow-200 px-1 rounded shadow-sm">${mainPlan}</span>
                `;
                
                document.getElementById('author').innerText = rows[12][1] || '值班主任';

            } catch (error) {
                console.error('抓取失敗:', error);
                document.getElementById('plan-content').innerText = '無法連線至 Google 試算表，請檢查權限設定。';
            }
        }

        fetchData();
    </script>
</body>
</html>
